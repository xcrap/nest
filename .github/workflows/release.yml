name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run tests
        run: make test

      - name: Build and package
        run: make package

      - name: Create ZIP
        run: ditto -c -k --keepParent Nest.app Nest-$(cat version.txt).zip

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          generateReleaseNotes: true
          removeArtifacts: true
          artifacts: "Nest-*.zip"
