name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SPARKLE_KEY: ${{ secrets.SPARKLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Import code signing certificate
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: make test

      - name: Build and sign
        run: |
          make package
          codesign --force --deep --options runtime \
            --sign "$CSC_NAME" \
            --entitlements scripts/entitlements.plist \
            dist/Nest.app

      - name: Create DMG and notarize
        run: |
          VERSION=$(cat version.txt)
          mkdir -p .dmg-staging
          cp -R dist/Nest.app .dmg-staging/
          ln -sf /Applications .dmg-staging/Applications
          hdiutil create -volname "Nest" -srcfolder .dmg-staging -ov -format UDZO "dist/Nest-${VERSION}.dmg"
          rm -rf .dmg-staging
          xcrun notarytool submit "dist/Nest-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "dist/Nest-${VERSION}.dmg"

      - name: Create Sparkle update ZIP
        run: |
          VERSION=$(cat version.txt)
          ditto -c -k --keepParent dist/Nest.app "dist/Nest-${VERSION}.zip"

      - name: Generate Sparkle appcast
        run: |
          VERSION=$(cat version.txt)
          DOWNLOAD_URL="https://github.com/xcrap/nest/releases/download/v${VERSION}/Nest-${VERSION}.zip"
          SIGN_OUTPUT=$(.build/artifacts/sparkle/Sparkle/bin/sign_update "dist/Nest-${VERSION}.zip" -f <(echo "$SPARKLE_KEY") 2>&1)
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          ED_LENGTH=$(echo "$SIGN_OUTPUT" | grep -o 'length="[^"]*"' | cut -d'"' -f2)
          cat > appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.net/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Nest</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>$(date -R)</pubDate>
                <enclosure url="${DOWNLOAD_URL}" ${SIGN_OUTPUT} type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Clean existing release assets
        run: |
          VERSION=$(cat version.txt)
          for asset in $(gh release view "v${VERSION}" --json assets --jq '.assets[].name' 2>/dev/null); do
            gh release delete-asset "v${VERSION}" "$asset" --yes 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          generateReleaseNotes: true
          artifacts: "dist/Nest-*.dmg,dist/Nest-*.zip"

      - name: Push appcast to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if ! git diff --cached --quiet; then
            git commit -m "Update appcast for v$(cat version.txt)"
          else
            echo "appcast.xml unchanged; nothing to push"
            exit 0
          fi
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "push attempt $attempt rejected, retrying..."
            sleep 3
          done
          echo "failed to push appcast update after retries"
          exit 1
