name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      CSC_NAME: ${{ secrets.CSC_NAME }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      SPARKLE_KEY: ${{ secrets.SPARKLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Import code signing certificate
        run: |
          echo "$CSC_LINK" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Resolve dependencies
        run: swift package resolve

      - name: Run tests
        run: make test

      - name: Build, sign, notarize, and create DMG
        run: |
          make package
          codesign --force --deep --options runtime \
            --sign "$CSC_NAME" \
            --entitlements scripts/entitlements.plist \
            dist/Nest.app
          VERSION=$(cat version.txt)
          mkdir -p .dmg-staging
          cp -R dist/Nest.app .dmg-staging/
          ln -sf /Applications .dmg-staging/Applications
          hdiutil create -volname "Nest" -srcfolder .dmg-staging -ov -format UDZO "dist/Nest-${VERSION}.dmg"
          rm -rf .dmg-staging
          xcrun notarytool submit "dist/Nest-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "dist/Nest-${VERSION}.dmg"

      - name: Generate Sparkle appcast
        run: |
          VERSION=$(cat version.txt)
          DOWNLOAD_URL="https://github.com/xcrap/nest/releases/download/v${VERSION}/Nest-${VERSION}.dmg"
          FILESIZE=$(stat -f%z "dist/Nest-${VERSION}.dmg")
          # Sign the update with Sparkle EdDSA key
          SIGNATURE=$(.build/artifacts/sparkle/Sparkle/bin/sign_update "dist/Nest-${VERSION}.dmg" -f <(echo "$SPARKLE_KEY") 2>/dev/null || echo "")
          # Extract edSignature and length from signature output
          ED_SIGNATURE=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          cat > appcast.xml << APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.net/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Nest</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>$(date -R)</pubDate>
                <enclosure url="${DOWNLOAD_URL}" length="${FILESIZE}" type="application/octet-stream" sparkle:edSignature="${ED_SIGNATURE}" />
              </item>
            </channel>
          </rss>
          APPCAST

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          generateReleaseNotes: true
          removeArtifacts: true
          artifacts: "dist/Nest-*.dmg"

      - name: Push appcast to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for v$(cat version.txt)" || true
          git push origin HEAD:main || true
